name: CI

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: ${{matrix.platform.name}} (${{matrix.build-variant}})
    runs-on: ${{matrix.platform.os}}
    strategy:
      fail-fast: true
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            kind: desktop
          - name: Linux
            os: ubuntu-latest
            kind: desktop
          - name: macOS
            os: macos-latest
            kind: desktop
          - name: iOS
            os: macos-15
            kind: ios
          - name: Android
            os: ubuntu-latest
            kind: android
        build-variant: [Debug, Release]
    steps:
      - uses: actions/checkout@v6

      # TODO: Install GCC without using a script.
      - if: matrix.platform.name == 'Linux'
        name: Installing GCC
        uses: egor-tensin/setup-gcc@v1
        with:
          version: 12

      - if: matrix.platform.name == 'Linux'
        name: Installing Linux dependencies
        run: |
            sudo apt-get update
            sudo apt-get install -y pkg-config libdbus-1-dev libx11-dev libxkbcommon-x11-dev libx11-xcb-dev

      - if: matrix.platform.kind == 'desktop'
        name: Configuring
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{matrix.build-variant}} -DCORE_BUILD_UNITY=ON

      - if: matrix.platform.kind == 'desktop'
        name: Building
        run: cmake --build build --clean-first --config ${{matrix.build-variant}} -j

      - if: matrix.platform.kind == 'desktop'
        name: Running tests
        run: build/bin/${{matrix.build-variant}}/unittest

      - if: matrix.platform.kind == 'ios'
        name: Selecting iOS Simulator
        shell: bash
        run: |
            set -euo pipefail
            device_id="$(xcrun simctl list devices available -j | jq -r '[.devices[] | .[] | select(.name | startswith("iPhone"))][0].udid // empty')"
            if [ -z "$device_id" ]; then
              echo "::error::No available iPhone simulator was found."
              exit 1
            fi
            echo "CORE_IOS_SIMULATOR_ID=$device_id" >> "$GITHUB_ENV"
            device_state="$(xcrun simctl list devices -j | jq -r --arg id "$device_id" '[.devices[] | .[] | select(.udid == $id)][0].state')"
            if [ "$device_state" != "Booted" ]; then
              xcrun simctl boot "$device_id"
            fi
            xcrun simctl bootstatus "$device_id" -b

      - if: matrix.platform.kind == 'ios'
        name: Configuring iOS tests
        run: >-
            cmake -S . -B build-ios -G Xcode
            -DCMAKE_SYSTEM_NAME=iOS
            -DCMAKE_OSX_SYSROOT=iphonesimulator
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0
            -DCORE_BUILD_STATIC=ON
            -DCORE_BUILD_UNITTEST=ON
            -DCORE_BUILD_UNITY=ON

      - if: matrix.platform.kind == 'ios'
        name: Running iOS tests
        run: >-
            xcodebuild
            -project build-ios/core.xcodeproj
            -scheme unittest_ios_host
            -configuration ${{matrix.build-variant}}
            -destination "platform=iOS Simulator,id=$CORE_IOS_SIMULATOR_ID"
            -parallel-testing-enabled NO
            test

      - if: matrix.platform.kind == 'android'
        name: Installing Android dependencies
        run: |
            set -euo pipefail
            sudo apt-get update
            sudo apt-get install -y ninja-build
            ndk_version="27.2.12479018"
            sdkmanager="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
            if [ ! -x "$sdkmanager" ]; then
              sdkmanager="$(command -v sdkmanager || true)"
            fi
            if [ ! -f "$ANDROID_HOME/ndk/$ndk_version/build/cmake/android.toolchain.cmake" ]; then
              if [ -z "$sdkmanager" ]; then
                echo "::error::sdkmanager was not found. Install Android command line tools or preinstall NDK $ndk_version."
                exit 1
              fi
              yes | "$sdkmanager" --licenses >/dev/null || true
              "$sdkmanager" --install "ndk;$ndk_version"
            fi

      - if: matrix.platform.kind == 'android'
        name: Preparing Android link smoke
        run: |
            set -euo pipefail
            smoke_dir="$RUNNER_TEMP/core_android_link_smoke_${{matrix.build-variant}}"
            mkdir -p "$smoke_dir/src"
            cat > "$smoke_dir/CMakeLists.txt" <<'CMAKE'
            cmake_minimum_required(VERSION 3.29)

            project(core_android_link_smoke CXX)

            set(CMAKE_ARCHIVE_OUTPUT_DIRECTORY "${CMAKE_BINARY_DIR}/bin/$<CONFIG>")
            set(CMAKE_LIBRARY_OUTPUT_DIRECTORY "${CMAKE_BINARY_DIR}/bin/$<CONFIG>")
            set(CMAKE_RUNTIME_OUTPUT_DIRECTORY "${CMAKE_BINARY_DIR}/bin/$<CONFIG>")

            set(CORE_BUILD_STATIC ON CACHE BOOL "" FORCE)
            set(CORE_BUILD_UNITTEST OFF CACHE BOOL "" FORCE)
            set(CORE_INSTALL OFF CACHE BOOL "" FORCE)

            add_subdirectory("$ENV{GITHUB_WORKSPACE}" core)

            add_library(core_android_link_smoke SHARED
                src/android_link_smoke.cpp
            )
            target_link_libraries(core_android_link_smoke PRIVATE core)
            CMAKE
            cat > "$smoke_dir/src/android_link_smoke.cpp" <<'CPP'
            #include <core/platform/platform.h>

            #include <android/native_activity.h>
            #include <stddef.h>

            inline static Platform_Window window = {};

            extern "C" __attribute__((visibility("default"))) void
            ANativeActivity_onCreate(ANativeActivity *activity, void *saved_state, size_t saved_state_size)
            {
                (void)saved_state;
                (void)saved_state_size;
                if (window.ctx == nullptr)
                    window = platform_window_init(Platform_Window_Desc {});
                platform_window_native_connect(&window, activity, nullptr);
            }
            CPP

      - if: matrix.platform.kind == 'android'
        name: Configuring Android link smoke
        run: |
            set -euo pipefail
            smoke_dir="$RUNNER_TEMP/core_android_link_smoke_${{matrix.build-variant}}"
            cmake -B build -S "$smoke_dir" -G Ninja \
              -DCMAKE_TOOLCHAIN_FILE="$ANDROID_HOME/ndk/27.2.12479018/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI=arm64-v8a \
              -DANDROID_PLATFORM=android-26 \
              -DCORE_BUILD_STATIC=ON \
              -DCORE_BUILD_UNITTEST=OFF \
              -DCORE_INSTALL=OFF \
              -DCMAKE_BUILD_TYPE=${{matrix.build-variant}}

      - if: matrix.platform.kind == 'android'
        name: Checking Android Java bridge
        run: |
            set -euo pipefail
            java_source_dir="$(find build -path '*/android/java/core/android/CoreNativeActivity.java' -printf '%h\n' -quit)"
            if [ -z "$java_source_dir" ]; then
              echo "::error::Generated CoreNativeActivity.java was not found."
              exit 1
            fi
            android_jar=""
            if [ -d "$ANDROID_HOME/platforms" ]; then
              android_jar="$(find "$ANDROID_HOME/platforms" -name android.jar | sort -V | tail -n 1)"
            fi
            if [ -z "$android_jar" ]; then
              echo "::error::No Android platform android.jar was found."
              exit 1
            fi
            mkdir -p build/android-java-classes
            javac -classpath "$android_jar" -d build/android-java-classes "$java_source_dir"/*.java

      - if: matrix.platform.kind == 'android'
        name: Building Android link smoke
        run: cmake --build build --target core_android_link_smoke